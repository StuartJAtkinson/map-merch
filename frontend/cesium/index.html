<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart on a Sleeve — Map Selector</title>
    <link rel="stylesheet" href="/app.css">
    <style>
        /* ── Map-selector-specific styles only ── */
        #cesiumContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }

        #panel {
            position: absolute; top: 20px; left: 20px; width: 300px;
            max-height: calc(100vh - 40px); overflow-y: auto; z-index: 1000;
        }

        .section { margin-bottom: 16px; }

        /* Merch grids */
        .merch-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .merch-btn {
            background: var(--bg-item); border: 1.5px solid var(--border-dim);
            color: var(--text-mid); padding: 8px 4px; border-radius: 7px;
            cursor: pointer; font-size: 11px; text-align: center;
            transition: all 0.12s; line-height: 1.3; font-family: inherit;
        }
        .merch-btn:hover { border-color: var(--border-item); color: var(--text-high); }
        .merch-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .merch-btn .ratio { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
        .merch-btn.active .ratio { color: #3a7acc; }
        .merch-divider { border: none; border-top: 1px solid var(--border-dim); margin: 8px 0 5px; }

        /* Style selector */
        .style-grid { display: flex; flex-direction: column; gap: 5px; }
        .style-btn {
            background: var(--bg-item); border: 1.5px solid var(--border-dim);
            color: var(--text-mid); padding: 7px 10px; border-radius: 6px;
            cursor: pointer; font-size: 12px; text-align: left;
            transition: all 0.12s; font-family: inherit;
        }
        .style-btn:hover { border-color: var(--border-item); color: var(--text-high); }
        .style-btn.active { border-color: var(--accent); color: var(--text-primary); background: var(--accent-soft); }

        /* Bbox display */
        #bbox-display { font-size: 10px; color: var(--text-muted); font-family: monospace; margin-top: 6px; line-height: 1.7; }

        /* Draw + secondary buttons */
        .btn-draw {
            width: 100%; padding: 9px; background: transparent;
            color: var(--text-mid); border: 1px solid var(--border-item);
            border-radius: var(--radius-btn); font-size: 12px; font-family: inherit;
            cursor: pointer; margin-bottom: 6px; transition: all 0.12s; text-align: center;
        }
        .btn-draw:hover { border-color: var(--border-panel); color: var(--text-high); }

        .btn-secondary {
            flex: 1; padding: 9px 6px; background: transparent;
            color: var(--text-mid); border: 1px solid var(--border-item);
            border-radius: var(--radius-btn); font-size: 12px; font-family: inherit;
            cursor: pointer; transition: all 0.12s; text-align: center;
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        #output-btns { display: none; gap: 7px; margin-top: 8px; }
        #status { font-size: 11px; color: var(--text-muted); margin-top: 10px; text-align: center; min-height: 16px; }
    </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div id="panel" class="panel">
    <h2>Heart on a Sleeve</h2>

    <div class="section">
        <h3>1. Select Area</h3>
        <button class="btn-draw" id="draw-btn">🎯 Draw Selection</button>
        <div id="bbox-display">No area selected</div>
    </div>

    <div class="section">
        <h3>2. Merch Type</h3>
        <div class="section-label">Fabrics &amp; Transfers</div>
        <div class="merch-grid">
            <div class="merch-btn active" data-type="tshirt">T-Shirt<div class="ratio">3:4</div></div>
            <div class="merch-btn" data-type="mug">Mug<div class="ratio">9:3</div></div>
            <div class="merch-btn" data-type="tote">Tote Bag<div class="ratio">2:3</div></div>
        </div>
        <hr class="merch-divider">
        <div class="section-label">3D Prints</div>
        <div class="merch-grid">
            <div class="merch-btn" data-type="coaster">Coaster<div class="ratio">1:1</div></div>
            <div class="merch-btn" data-type="placemat">Placemat<div class="ratio">14:10</div></div>
            <div class="merch-btn" data-type="3d_print">Relief<div class="ratio">1:1</div></div>
        </div>
    </div>

    <div class="section">
        <h3>3. Map Style</h3>
        <div class="style-grid">
            <div class="style-btn active" data-style="osm_default">🗺 OSM Default</div>
            <div class="style-btn" data-style="minimalist">◻ Minimalist</div>
            <div class="style-btn" data-style="vibrant">🎨 Vibrant</div>
        </div>
    </div>

    <div class="section">
        <h3>4. Include</h3>
        <div class="toggle-row"><span>Place labels</span><div class="toggle on" id="tog-labels"></div></div>
        <div class="toggle-row"><span>Buildings</span><div class="toggle on" id="tog-buildings"></div></div>
    </div>

    <button class="btn-primary" id="generate-btn" disabled>
        <span class="spinner" id="spinner"></span>
        <span id="btn-text">Generate Design</span>
    </button>

    <div id="output-btns">
        <button class="btn-secondary" id="view-2d-btn">View SVG</button>
        <button class="btn-secondary" id="view-3d-btn">View 3D</button>
    </div>

    <div id="status"></div>
</div>

<script type="module" src="/src/app.ts"></script>
</body>
</html>
