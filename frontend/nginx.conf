server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API — BACKEND_URL is injected at container start via envsubst.
    # Strip Origin so the backend's CORS middleware doesn't reject proxied requests.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin "";
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 16k;
    }

    # Serve generated SVG/STL output files
    location /output/ {
        proxy_pass ${BACKEND_URL}/output/;
        proxy_ssl_server_name on;
    }

    # FastAPI docs (dev convenience)
    location /docs {
        proxy_pass ${BACKEND_URL}/docs;
        proxy_ssl_server_name on;
    }
}
